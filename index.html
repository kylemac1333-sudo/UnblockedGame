<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .nav-back { position: absolute; top: 10px; left: 10px; z-index: 100; padding: 10px; background: #333; color: white; text-decoration: none; border-radius: 5px; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">← Back to Home</a>
    <div id="gameWindow"></div>

    <script>
        // Get game ID from URL
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('id');

        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const game = data.find(g => g.id === gameId);
                if (game) {
                    document.title = "Playing: " + game.title;
                    document.getElementById('gameWindow').innerHTML = `<iframe src="${game.url}" allowfullscreen></iframe>`;
                } else {
                    document.body.innerHTML = "<h1>Game not found</h1>";
                }
            });
    </script>
</body>
</html>
